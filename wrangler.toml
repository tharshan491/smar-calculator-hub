# worker/wrangler.toml
# Cloudflare Workers configuration
# Docs: https://developers.cloudflare.com/workers/

name               = "smart-calc-api"
main               = "mnt/user-data/outputs/final/worker/src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# ── Get your account_id by running: wrangler whoami ──────────────────────────
account_id = "34825494c4a8606734997a9a8ad6d6f8"

[vars]
ENVIRONMENT = "production"

# ── Secrets — run these commands once after deploying: ───────────────────────
#
#   wrangler secret put SUPABASE_URL
#   → paste: https://xxxxxxxxxxxx.supabase.co
#
#   wrangler secret put SUPABASE_ANON_KEY
#   → paste: your anon/public key from Supabase dashboard → Settings → API
#
# Secrets are encrypted and never stored in this file.

# ── Optional: custom domain ───────────────────────────────────────────────────
# [[routes]]
# pattern = "api.yourdomain.com/*"
# zone_name = "yourdomain.com"