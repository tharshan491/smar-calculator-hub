name: 🤖 Auto-Publish SEO Content

on:
  schedule:
    # Run every Monday at 2 AM UTC (content generation)
    - cron: '0 2 * * 1'
    # Run daily at 6 AM UTC (daily batch)
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: content-automation
  cancel-in-progress: false

jobs:
  generate-content:
    name: 📝 Generate SEO Content
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🎯 Generate high-priority content (Monday weekly)
        if: github.event.schedule == '0 2 * * 1'
        run: node seo-content/prompts-db/auto-publish.js batch high:10
        env:
          NODE_ENV: production

      - name: 🎯 Generate daily batch content
        if: github.event.schedule == '0 6 * * *'
        run: node seo-content/prompts-db/auto-publish.js batch high:5 && node seo-content/prompts-db/auto-publish.js batch medium:3
        env:
          NODE_ENV: production

      - name: 🎯 Manual trigger - full pipeline
        if: github.event_name == 'workflow_dispatch'
        run: node seo-content/prompts-db/auto-publish.js pipeline
        env:
          NODE_ENV: production

      - name: 📊 Check generation status
        run: node seo-content/prompts-db/auto-publish.js status

      - name: ✅ Verify generated files
        run: |
          echo "Generated content:"
          find seo-content/generated-content -name "*.md" -type f | wc -l
          echo "API JSON files:"
          find seo-content/api/content -name "*.json" -type f | wc -l

      - name: 🔄 Create Pull Request with new content
        uses: peter-evans/create-pull-request@v4
        with:
          commit-message: '🤖 Auto-publish: Generated SEO content [skip ci]'
          title: 'Auto-publish: New SEO content generated'
          body: |
            ## 🤖 Automated Content Generation
            
            - Generated new SEO articles from prompts database
            - All content is SEO-optimized and ready for production
            - Check for any review notes before merging
            
            ### Quality Checks
            - ✅ Content structure validation
            - ✅ Keyword density optimization
            - ✅ Meta tag generation
            - ✅ Internal linking setup
          branch: auto-publish-content
          delete-branch: true

  deploy-to-vercel:
    name: 🚀 Deploy to Vercel
    runs-on: ubuntu-latest
    needs: generate-content
    if: success()

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3
        with:
          ref: auto-publish-content

      - name: 🚀 Deploy to Vercel
        uses: vercel/action@master
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          production: true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

  notify-slack:
    name: 💬 Notify Slack
    runs-on: ubuntu-latest
    needs: [generate-content, deploy-to-vercel]
    if: always()

    steps:
      - name: 📤 Send Slack notification
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "🤖 SEO Content Automation",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*SEO Content Generation & Deployment*\n*Status:* ${{ job.status }}\n*Triggered:* ${{ github.event_name }}\n*Time:* <!date^${{ github.event.head_commit.timestamp }}^{date_num} {time_secs}|{{ github.event.head_commit.timestamp }}>"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*\n${{ github.repository }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\nauto-publish-content"
                    }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Build"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  analytics:
    name: 📈 Update Analytics
    runs-on: ubuntu-latest
    needs: deploy-to-vercel
    if: success()

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 📊 Generate analytics report
        run: |
          cat > analytics-report.json << 'EOF'
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "event": "content_deployment",
            "status": "success",
            "deployment_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF

      - name: 📤 Upload analytics
        uses: actions/upload-artifact@v3
        with:
          name: analytics-report
          path: analytics-report.json
          retention-days: 30
